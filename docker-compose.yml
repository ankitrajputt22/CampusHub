services:
  mysql:
    image: mysql:8.4
    container_name: campus-hub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-campus_hub}
      MYSQL_USER: ${MYSQL_USER:-campus_hub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-campus_hub_local_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-campus_hub_root_local_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: campus-hub-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  redis-data:
