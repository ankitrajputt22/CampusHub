spring:
  datasource:
    url: jdbc:h2:mem:campushub;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  security:
    jwt-secret: test-only-placeholder-secret-with-at-least-32-characters
    access-token-minutes: 60
    refresh-token-days: 1
    remember-me-refresh-token-days: 30
  otp:
    expiry-minutes: 10
    expose-dev-codes: true
