spring:
  datasource:
    url: jdbc:h2:mem:campushub-local;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  security:
    jwt-secret: local-development-only-secret-change-before-production
  otp:
    expose-dev-codes: true
